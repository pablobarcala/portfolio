<div class="container">
    <div class="img">
        <img src="../../../assets/education-imgs/{{education.img}}" alt="{{education.name}}">
    </div>
    <h3>{{education.name}}</h3>
    <h4>{{education.title}}</h4>
    <p class="description">{{education.description}}</p>
    <p class="fechas">{{education.inicio}} @if(education.final) {
        - {{education.final}}
    } </p>
    @if(!education.final) {
        <p class="progreso">
            @if(idioma == "Es"){
                En progreso
            }@else {
                In progress
            }
        </p>
    }
    @if(education.url) {
        <a target="_blank" id="btn" href="{{education.url}}">
            @if(idioma == "Es"){
                Certificado
            }@else {
                Certificate
            }
        </a>
    }
    <div class="separator"></div>
</div>
